apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-task-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/Vaibhav-Singh2/ai-task-platform-infra.git"
    targetRevision: HEAD
    path: base
  destination:
    server: "https://kubernetes.default.svc"
    namespace: ai-task-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
