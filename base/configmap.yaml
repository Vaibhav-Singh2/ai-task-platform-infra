apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: ai-task-platform
data:
  NODE_ENV: "production"
  PORT: "5000"
  MONGO_URI: "mongodb://mongodb:27017/ai_task_platform"
  REDIS_URL: "redis://redis:6379"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: ai-task-platform
data:
  NEXT_PUBLIC_API_URL: "http://ai-task-platform.local/api"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-config
  namespace: ai-task-platform
data:
  MONGO_URI: "mongodb://mongodb:27017/ai_task_platform"
  REDIS_URL: "redis://redis:6379"
  QUEUE_NAME: "task_queue"
